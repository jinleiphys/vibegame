<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>PI Desktop</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #070b10;
      --panel: rgba(13, 19, 27, .82);
      --line: rgba(255, 255, 255, .14);
      --text: #edf4ff;
      --muted: #8fa1b7;
      --accent: #20d6a1;
      --accent-2: #f4b340;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 28px;
      color: var(--text);
      font-family: "Avenir Next", "Gill Sans", "Trebuchet MS", sans-serif;
      background:
        radial-gradient(circle at 20% 16%, rgba(32, 214, 161, .20), transparent 28%),
        radial-gradient(circle at 78% 20%, rgba(244, 179, 64, .16), transparent 26%),
        linear-gradient(145deg, #05070b, var(--bg) 58%, #0d171d);
    }
    main {
      width: min(760px, 100%);
      padding: clamp(28px, 6vw, 56px);
      border: 1px solid var(--line);
      border-radius: 28px;
      background: var(--panel);
      box-shadow: 0 40px 120px rgba(0, 0, 0, .48);
      position: relative;
      overflow: hidden;
    }
    main::before {
      content: "";
      position: absolute;
      inset: 0;
      background-image:
        linear-gradient(rgba(255,255,255,.05) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,.045) 1px, transparent 1px);
      background-size: 34px 34px;
      mask-image: linear-gradient(140deg, rgba(0,0,0,.75), transparent 70%);
      pointer-events: none;
    }
    .eyebrow {
      margin: 0 0 14px;
      color: var(--accent);
      font-size: 13px;
      font-weight: 800;
      letter-spacing: .22em;
      text-transform: uppercase;
    }
    h1 {
      margin: 0;
      font-size: clamp(44px, 9vw, 86px);
      line-height: .9;
      letter-spacing: -.06em;
    }
    p {
      max-width: 560px;
      margin: 22px 0 32px;
      color: var(--muted);
      font-size: 18px;
      line-height: 1.75;
    }
    a {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      min-height: 48px;
      padding: 0 22px;
      border-radius: 999px;
      color: #03110c;
      background: linear-gradient(135deg, var(--accent), var(--accent-2));
      font-weight: 900;
      text-decoration: none;
      box-shadow: 0 18px 45px rgba(32, 214, 161, .24);
    }
    a:focus-visible {
      outline: 3px solid rgba(255, 255, 255, .8);
      outline-offset: 5px;
    }
    .path {
      margin-top: 22px;
      color: var(--muted);
      font-family: "SFMono-Regular", Consolas, monospace;
      font-size: 13px;
    }
  </style>
</head>
<body>
  <main>
    <p class="eyebrow">PI Desktop</p>
    <h1>Tenure Track Game</h1>
    <p>游戏已经移动到 <strong>PI-Desktop/</strong> 子目录。点击下面入口进入理论核物理 PI 桌面。</p>
    <a href="./PI-Desktop/index.html">进入游戏 →</a>
    <div class="path">./PI-Desktop/index.html</div>
  </main>
</body>
</html>
