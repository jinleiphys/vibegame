<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="icon" href="data:,">
  <title>Game Index</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #070b10;
      --panel: rgba(13, 19, 27, .82);
      --line: rgba(255, 255, 255, .14);
      --text: #edf4ff;
      --muted: #8fa1b7;
      --accent: #20d6a1;
      --accent-2: #f4b340;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 28px;
      color: var(--text);
      font-family: "Avenir Next", "Gill Sans", "Trebuchet MS", sans-serif;
      background:
        radial-gradient(circle at 20% 16%, rgba(32, 214, 161, .20), transparent 28%),
        radial-gradient(circle at 78% 20%, rgba(244, 179, 64, .16), transparent 26%),
        linear-gradient(145deg, #05070b, var(--bg) 58%, #0d171d);
    }
    main {
      width: min(940px, 100%);
      padding: clamp(28px, 6vw, 56px);
      border: 1px solid var(--line);
      border-radius: 28px;
      background: var(--panel);
      box-shadow: 0 40px 120px rgba(0, 0, 0, .48);
      position: relative;
      overflow: hidden;
    }
    main::before {
      content: "";
      position: absolute;
      inset: 0;
      background-image:
        linear-gradient(rgba(255,255,255,.05) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,.045) 1px, transparent 1px);
      background-size: 34px 34px;
      mask-image: linear-gradient(140deg, rgba(0,0,0,.75), transparent 70%);
      pointer-events: none;
    }
    .eyebrow {
      margin: 0 0 14px;
      color: var(--accent);
      font-size: 13px;
      font-weight: 800;
      letter-spacing: .22em;
      text-transform: uppercase;
    }
    h1 {
      margin: 0;
      font-size: clamp(44px, 9vw, 86px);
      line-height: .9;
      letter-spacing: -.06em;
    }
    p {
      max-width: 560px;
      margin: 22px 0 32px;
      color: var(--muted);
      font-size: 18px;
      line-height: 1.75;
    }
    .gameGrid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 16px;
      margin-top: 30px;
    }
    .gameCard {
      position: relative;
      min-height: 250px;
      padding: 22px;
      border: 1px solid var(--line);
      border-radius: 18px;
      background: rgba(255, 255, 255, .055);
      overflow: hidden;
    }
    .cover {
      display: block;
      width: calc(100% + 44px);
      aspect-ratio: 16 / 9;
      margin: -22px -22px 18px;
      object-fit: cover;
      border-bottom: 1px solid var(--line);
      filter: saturate(1.04) contrast(1.03);
    }
    .gameCard h2 {
      margin: 0;
      font-size: 30px;
      line-height: 1.1;
    }
    .gameCard p {
      margin: 14px 0 22px;
      font-size: 15px;
      line-height: 1.6;
    }
    a {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      min-height: 48px;
      padding: 0 22px;
      border-radius: 999px;
      color: #03110c;
      background: linear-gradient(135deg, var(--accent), var(--accent-2));
      font-weight: 900;
      text-decoration: none;
      box-shadow: 0 18px 45px rgba(32, 214, 161, .24);
    }
    a:focus-visible {
      outline: 3px solid rgba(255, 255, 255, .8);
      outline-offset: 5px;
    }
    .path {
      margin-top: 22px;
      color: var(--muted);
      font-family: "SFMono-Regular", Consolas, monospace;
      font-size: 13px;
    }
    .gameCard .path {
      margin-top: 14px;
    }
    @media (max-width: 720px) {
      .gameGrid {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <main>
    <p class="eyebrow">Game Index</p>
    <h1>游戏入口</h1>
    <p>这里保留两个独立游戏的入口。PI Desktop 和学术志：共同体不是同一个游戏。</p>
    <div class="gameGrid">
      <section class="gameCard">
        <img class="cover" src="./assets/launcher-pi-desktop.png" alt="Tenure Track Game 封面图">
        <h2>Tenure Track Game</h2>
        <p>理论核物理 PI 桌面游戏，位于 <strong>PI-Desktop/</strong> 子目录。</p>
        <a href="./PI-Desktop/index.html">进入 PI Desktop →</a>
        <div class="path">./PI-Desktop/index.html</div>
      </section>
      <section class="gameCard">
        <img class="cover" src="./assets/launcher-scholar-ambition.png" alt="学术志：共同体封面图">
        <h2>学术志：共同体</h2>
        <p>RPG 学术圈地图游戏，位于 <strong>scholar-ambition-full/</strong> 子目录。</p>
        <a href="./scholar-ambition-full/index.html">进入学术志 →</a>
        <div class="path">./scholar-ambition-full/index.html</div>
      </section>
    </div>
  </main>
</body>
</html>
